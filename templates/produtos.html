<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#1b1411">

    <title>Produtos • Café Lumière</title>

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS PRINCIPAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

</head>

<body>

    <div class="container">

        <div class="dashboard-box produtos-box">

            <!-- TOPO -->
            <div class="topo-pagina">

                <h1>📦 Produtos</h1>

                <p>
                    Gerencie os produtos cadastrados da cafeteria
                </p>

            </div>

            <!-- FORMULÁRIO -->
            <form
                method="POST"
                action="/add_product"
                class="form-produto"
            >

                <div class="campo">

                    <label for="nome">
                        Nome do Produto
                    </label>

                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        placeholder="Ex: Cappuccino Especial"
                        required
                    >

                </div>

                <div class="campo">

                    <label for="preco">
                        Preço
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        id="preco"
                        name="preco"
                        placeholder="0.00"
                        required
                    >

                </div>

                <button type="submit" class="btn-salvar">
                    ➕ Adicionar Produto
                </button>

            </form>

            <!-- LISTA -->
            <div class="lista-produtos-admin">

                {% for product in products %}

                    <div class="card produto-card">

                        <div class="produto-info">

                            <h3>
                                {{ product.nome }}
                            </h3>

                            <p>
                                R$ {{ product.preco }}
                            </p>

                        </div>

                        <a
                            href="/delete_product/{{ product.id }}"
                            class="btn-delete"
                        >
                            🗑 Excluir
                        </a>

                    </div>

                {% endfor %}

            </div>

            <!-- VOLTAR -->
            <div class="menu-dashboard">

                <a href="/dashboard" class="menu-btn">
                    ⬅ Voltar ao Dashboard
                </a>

            </div>

        </div>

    </div>
        <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
